<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Admin | Mahamaya Enterprise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-admin" data-page="admin">
  <header class="admin-header">
    <a class="brand" href="index.html">
      <div class="brand-mark">ME</div>
      <div>
        <div class="brand-title">Mahamaya Enterprise</div>
        <div class="brand-tagline">Admin control center</div>
      </div>
    </a>
    <div class="header-actions">
      <button id="admin-logout" class="btn btn-ghost" type="button">Log out</button>
    </div>
  </header>

  <main class="admin-layout">
    <section id="admin-login" class="admin-card">
      <h1>Admin sign in</h1>
      <p class="muted">Use the admin credentials from your .env file.</p>
      <form id="admin-login-form">
        <label>
          Email
          <input type="email" name="email" required />
        </label>
        <label>
          Password
          <input type="password" name="password" required />
        </label>
        <button class="btn btn-accent" type="submit">Sign in</button>
        <div id="admin-login-message" class="form-message"></div>
      </form>
    </section>

    <section id="admin-dashboard" class="admin-dashboard hidden">
      <div class="admin-card">
        <h2>Store settings</h2>
        <form id="settings-form">
          <div class="field-grid">
            <label>
              Store name
              <input type="text" name="storeName" required />
            </label>
            <label>
              Phone
              <input type="text" name="phone" required />
            </label>
            <label>
              WhatsApp
              <input type="text" name="whatsapp" required />
            </label>
            <label>
              Support email
              <input type="email" name="email" />
            </label>
          </div>
          <label>
            Address
            <input type="text" name="address" required />
          </label>
          <label>
            Hours
            <input type="text" name="hours" required />
          </label>
          <div class="field-grid">
            <label>
              Delivery fee
              <input type="number" name="deliveryFee" min="0" step="1" />
            </label>
            <label>
              Free delivery above
              <input type="number" name="freeAbove" min="0" step="1" />
            </label>
          </div>
          <label>
            Announcement
            <input type="text" name="announcement" />
          </label>
          <div class="form-actions">
            <button class="btn btn-accent" type="submit">Save settings</button>
          </div>
          <div id="settings-message" class="form-message"></div>
        </form>
      </div>
      <div class="admin-grid">
        <div class="admin-card">
          <h2>Product manager</h2>
          <form id="product-form">
            <input type="hidden" name="id" />
            <div class="field-grid">
              <label>
                Name
                <input type="text" name="name" required />
              </label>
              <label>
                Category
                <input type="text" name="category" required />
              </label>
              <label>
                Brand
                <input type="text" name="brand" />
              </label>
              <label>
                SKU
                <input type="text" name="sku" />
              </label>
            </div>
            <div class="field-grid">
              <label>
                Price
                <input type="number" name="price" step="0.01" required />
              </label>
              <label>
                MRP
                <input type="number" name="mrp" step="0.01" />
              </label>
              <label>
                Stock
                <input type="number" name="stock" />
              </label>
              <label>
                Rating
                <input type="number" name="rating" step="0.1" max="5" />
              </label>
            </div>
            <label>
              Tags (comma separated)
              <input type="text" name="tags" />
            </label>
            <label>
              Short description
              <input type="text" name="shortDesc" />
            </label>
            <label>
              Long description
              <textarea name="longDesc" rows="3"></textarea>
            </label>
            <label>
              Image URL (optional)
              <input type="text" name="imageUrl" />
            </label>
            <label>
              Upload image
              <input type="file" name="imageFile" accept="image/*" />
            </label>
            <div class="field-grid">
              <label class="check-pill"><input type="checkbox" name="featured" /> Featured</label>
              <label class="check-pill"><input type="checkbox" name="bestSeller" /> Best seller</label>
            </div>
            <div class="form-actions">
              <button class="btn btn-accent" type="submit">Save product</button>
              <button class="btn btn-ghost" type="button" id="product-reset">Reset</button>
            </div>
            <div id="product-message" class="form-message"></div>
          </form>
        </div>

        <div class="admin-card">
          <h2>Products</h2>
          <div class="table-wrap">
            <table class="admin-table" id="products-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="products-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="admin-card">
        <div class="admin-card-header">
          <h2>Orders</h2>
          <button class="btn btn-dark" id="export-orders" type="button">Export Excel</button>
        </div>
        <div class="table-wrap">
          <table class="admin-table" id="orders-table">
            <thead>
              <tr>
                <th>Order</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div class="modal" id="order-modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Order details</h3>
        <button class="icon-btn" id="close-order-modal" type="button">Close</button>
      </div>
      <div id="order-modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="admin.js" defer></script>
</body>
</html>
